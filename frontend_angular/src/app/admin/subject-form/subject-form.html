<div class="card">
  <h3>{{ editingSubject ? 'Edit Subject' : 'Create New Subject' }}</h3>
  <form>
    <div class="form-row">
      <div class="form-group">
        <label for="subjectName">Subject Name *</label>
        <input
          type="text"
          id="subjectName"
          [(ngModel)]="subjectForm.name"
          name="subjectName"
          required>
      </div>
      <div class="form-group">
        <label for="teacherSelect">Assign Teacher</label>
        <select id="teacherSelect" [(ngModel)]="subjectForm.teacherId" name="teacherId">
          <option value="">None</option>
          <option *ngFor="let teacher of teachers" [value]="teacher.id">
            {{ teacher.name }} {{ teacher.lastName }}
          </option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label for="subjectDescription">Description</label>
      <textarea
        id="subjectDescription"
        [(ngModel)]="subjectForm.description"
        name="description"
        rows="3">
          </textarea>
    </div>
    <div class="form-row">
      <button type="button" (click)="onSave()">
        {{ editingSubject ? 'Update Subject' : 'Create Subject' }}
      </button>
      <button type="button" (click)="onCancel()" *ngIf="editingSubject">Cancel</button>
    </div>
  </form>
  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
</div>
